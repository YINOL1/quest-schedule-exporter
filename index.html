<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Schedule Exporter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h2 class="hero-title">University of Waterloo Quest Schedule Exporter</h2>

        <div class="links">
            <a href="https://github.com/YINOL1/quest-schedule-exporter" target="_blank" class="hero-link">View on GitHub</a>
        </div>

    </header>

    <div class="container">
        <p>Copy and paste your entire 'list view' schedule from Quest to the box below.</p>

        <textarea name="questInputArea" id="questInputArea" placeholder="Paste your schedule here..."></textarea>

        <div class="button-group">
            <button id="clearBtn" class="secondary-btn">Clear Text</button>
            <button id="downloadBtn" class="primary-btn">Download .ics File</button>
        </div>
    </div>

    <footer>
        <h3 class="footer">Take a look at my GitHub page @<a href="https://github.com/YINOL1" target="_blank" class="footer-link">YINOL1</a></h3>
    </footer>

    <script src="schedule-exporter.js"></script>
    <script src="script.js"></script>
</body>
</html>
